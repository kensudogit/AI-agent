services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  # 本番用: フロント＋API を 1 つで提供（Next.js standalone）
  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_agent
      DATABASE_SSL: "false"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  # 開発用フロント: ホットリロード付き（next dev）。Docker 起動時にフロントも起動する用
  frontend:
    build:
      context: .
      target: builder
    ports:
      - "3002:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      WATCHPACK_POLLING: "true"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_agent
      DATABASE_SSL: "false"
    env_file:
      - .env
    command: ["sh", "-c", "npm run dev"]
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
